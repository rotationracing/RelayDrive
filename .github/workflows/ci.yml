name: CI
on:
  push:
    branches:
      - main
    paths:
      - 'src-tauri/**'
      - 'Cargo.lock'
      - 'package.json'
      - 'bun.lockb'
  pull_request:
    branches:
      - main
    paths:
      - 'src-tauri/**'
      - 'Cargo.lock'
      - 'package.json'
      - 'bun.lockb'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install Dependencies
        run: bun install

      - name: Build (Check)
        run: cargo check --manifest-path src-tauri/Cargo.toml
